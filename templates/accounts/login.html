<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | InterviewPrep</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom Style System -->
    <link href="/static/css/styles.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0b0f19 0%, #1e1b4b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .auth-card {
            max-width: 420px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container auth-card px-3">
        <!-- Messages Toast Alert -->
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show border-0 mb-3 rounded-3 shadow-sm" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
        {% endif %}

        <div class="glass-card animated-card">
            <div class="text-center mb-4">
                <div class="brand-icon mx-auto mb-3" style="width: 48px; height: 48px; font-size: 1.5rem;">
                    <i class="fas fa-brain"></i>
                </div>
                <h2 class="h3 fw-bold mb-1">Welcome Back</h2>
                <p class="text-muted small">Sign in to continue your interview prep</p>
            </div>
            
            <form action="{% url 'login' %}" method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label form-label-custom">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-secondary border-color text-muted" style="border-radius: 12px 0 0 12px;"><i class="fas fa-user"></i></span>
                        <input type="text" name="username" class="form-control form-control-custom" placeholder="Enter username" required style="border-radius: 0 12px 12px 0;">
                    </div>
                </div>
                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <label class="form-label form-label-custom mb-0">Password</label>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text bg-secondary border-color text-muted" style="border-radius: 12px 0 0 12px;"><i class="fas fa-lock"></i></span>
                        <input type="password" name="password" class="form-control form-control-custom" placeholder="Enter password" required style="border-radius: 0 12px 12px 0;">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary-custom w-100 py-2.5 mb-3">Sign In</button>
            </form>
            
            <div class="text-center">
                <p class="text-muted small mb-0">Don't have an account? <a href="{% url 'register' %}" class="text-indigo fw-semibold text-decoration-none" style="color: var(--accent-color);">Register here</a></p>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
