<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | InterviewPrep</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom Style System -->
    <link href="/static/css/styles.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0b0f19 0%, #1e1b4b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 0;
        }
        .auth-card {
            max-width: 500px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container auth-card px-3">
        <div class="glass-card animated-card">
            <div class="text-center mb-4">
                <div class="brand-icon mx-auto mb-3" style="width: 48px; height: 48px; font-size: 1.5rem;">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h2 class="h3 fw-bold mb-1">Create Account</h2>
                <p class="text-muted small">Sign up to kickstart your preparation journey</p>
            </div>
            
            <form action="{% url 'register' %}" method="POST">
                {% csrf_token %}
                
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label form-label-custom" for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% if field.help_text %}
                    <div class="form-text text-muted" style="font-size: 0.75rem;">{{ field.help_text }}</div>
                    {% endif %}
                    {% for error in field.errors %}
                    <div class="text-danger small mt-1"><i class="fas fa-exclamation-circle me-1"></i>{{ error }}</div>
                    {% endfor %}
                </div>
                {% endfor %}
                
                <button type="submit" class="btn btn-primary-custom w-100 py-2.5 mt-3 mb-3">Create Account</button>
            </form>
            
            <div class="text-center">
                <p class="text-muted small mb-0">Already have an account? <a href="{% url 'login' %}" class="text-indigo fw-semibold text-decoration-none" style="color: var(--accent-color);">Sign In</a></p>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
