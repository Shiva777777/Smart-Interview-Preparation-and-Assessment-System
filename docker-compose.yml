version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: interview_db
    restart: always
    environment:
      MYSQL_DATABASE: interview_prep
      MYSQL_USER: interview_user
      MYSQL_PASSWORD: Shiva@9876#Data
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      # Forward host port 3307 to container port 3306 to avoid conflicts with host's local MySQL
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u$$MYSQL_USER", "-p$$MYSQL_PASSWORD" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    build: .
    container_name: interview_web
    restart: always
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      # Bind mount the local codebase for hot-reloading in development
      - .:/app
    ports:
      - "8888:8000"
    environment:
      - DB_NAME=interview_prep
      - DB_USER=interview_user
      - DB_PASSWORD=Shiva@9876#Data
      - DB_HOST=db
      - DB_PORT=3306
    depends_on:
      db:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: interview_prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - web

  grafana:
    image: grafana/grafana:10.0.0
    container_name: interview_grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  mysql_data:
  prometheus_data:
  grafana_data:
