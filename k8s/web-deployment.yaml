apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: default
spec:
  type: NodePort
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30099 # Exposes the service on port 30099 of all Kubernetes nodes
  selector:
    app: web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: django-web
          # NOTE: Since Kubernetes cannot build images from a local Dockerfile,
          # you must build your image and push it to a registry or load it:
          #   docker build -t interview-web:latest .
          # If using Minikube, load it with:
          #   minikube image load interview-web:latest
          image: interview-web:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: interview-secrets
                  key: mysql-database
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: interview-secrets
                  key: mysql-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: interview-secrets
                  key: mysql-password
            - name: DB_HOST
              value: "db"
            - name: DB_PORT
              value: "3306"
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
